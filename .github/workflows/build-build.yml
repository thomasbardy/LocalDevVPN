name: Build IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # Baut das Projekt auf die simpelste Art und Weise, die Xcode kennt
      - name: Build Project
        run: |
          xcodebuild -project LocalDevVPN.xcodeproj \
                     -scheme LocalDevVPN \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      # Erstellt die IPA, indem es die App im Standard-Ausgabeordner sucht
      - name: Package IPA
        run: |
          mkdir -p Payload
          # Sucht im gesamten Runner-Verzeichnis nach der fertigen .app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "LocalDevVPN.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: LocalDevVPN.app wurde nirgends gefunden!" && exit 1
          fi
          
          cp -r "$APP_PATH" Payload/
          zip -r LocalDevVPN.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalDevVPN-Unsigned-IPA
          path: LocalDevVPN.ipa
