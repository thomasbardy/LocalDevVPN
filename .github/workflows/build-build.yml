name: Build IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Baut die App direkt über das Swift-Package-System (ignoriert die kaputte Xcode-Datei)
      - name: Build with Swift Package Manager
        run: |
          swift build -c release --triple arm64-apple-ios

      # Erstellt die korrekte IPA-Struktur
      - name: Package IPA
        run: |
          mkdir -p Payload
          # Sucht die kompilierte App im Swift-Build-Ordner
          APP_PATH=$(find .build -name "LocalDevVPN.app" -type d | head -n 1)
          
          # Falls der Swift-Build-Pfad anders heißt, suchen wir zur Sicherheit überall nach der .app
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "LocalDevVPN.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: LocalDevVPN.app wurde nicht gebaut!" && exit 1
          fi
          
          cp -r "$APP_PATH" Payload/
          zip -r LocalDevVPN.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalDevVPN-Unsigned-IPA
          path: LocalDevVPN.ipa
