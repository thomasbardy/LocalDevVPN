name: Zwinge Neuen Build Ohne Flags
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # Wir erstellen ein sauberes, separates Bash-Skript, um jeglichen GitHub-Cache zu umgehen
      - name: Build Project Custom
        run: |
          echo "Bauen startet..."
          xcodebuild archive \
            -project LocalDevVPN.xcodeproj \
            -scheme LocalDevVPN \
            -archivePath ./build/LocalDevVPN.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # Wir holen uns die App direkt aus dem frisch erstellten Archiv-Ordner
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ./build/LocalDevVPN.xcarchive/Products/Applications/LocalDevVPN.app Payload/
          zip -r LocalDevVPN.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalDevVPN-Unsigned-IPA
          path: LocalDevVPN.ipa
