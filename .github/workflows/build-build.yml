name: Build IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # Erstellt automatisch die fehlenden Schemes, damit Xcode weiß, was es tun soll
      - name: Recreate Missing Schemes
        run: |
          ruby -e '
          require "rexml/document"
          project_path = "LocalDevVPN.xcodeproj"
          username = "runner"
          schemes_dir = File.join(project_path, "xcshareddata", "xcschemes")
          FileUtils.mkdir_p(schemes_dir)
          scheme_path = File.join(schemes_dir, "LocalDevVPN.xcscheme")
          
          unless File.exist?(scheme_path)
            content = <<-XML
            <?xml version="1.0" encoding="UTF-8"?>
            <Scheme LastUpgradeVersion="1500">
               <BuildAction parallelizeBuildables="YES" buildImplicitDependencies="YES">
                  <BuildActionEntries>
                     <BuildActionEntry buildForTesting="YES" buildForRunning="YES" buildForProfiling="YES" buildForArchiving="YES" buildForAnalyzing="YES">
                        <BuildableReference
                           BuildableIdentifier="primary"
                           BlueprintIdentifier="LocalDevVPN"
                           BuildableName="LocalDevVPN.app"
                           BlueprintName="LocalDevVPN"
                           ReferencedContainer="container:#{project_path}">
                        </BuildableReference>
                     </BuildActionEntry>
                  </BuildActionEntries>
               </BuildAction>
            </Scheme>
            XML
            File.write(scheme_path, content)
            puts "Scheme erfolgreich generiert!"
          end
          '

      # Baut das Projekt mit dem frisch generierten Scheme
      - name: Build Project
        run: |
          xcodebuild -project LocalDevVPN.xcodeproj \
                     -scheme LocalDevVPN \
                     -sdk iphoneos \
                     -configuration Release \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build
                     
      # Sucht die App im Standard-Ordner von Xcode und packt sie
      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "LocalDevVPN.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: LocalDevVPN.app nicht im DerivedData Ordner gefunden!" && exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r LocalDevVPN.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalDevVPN-Unsigned-IPA
          path: LocalDevVPN.ipa
